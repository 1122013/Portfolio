    <script src="../../JS/header.js"></script>
    <script>
        const stack = document.querySelector('[data-photo-stack]');
        const cards = Array.from(document.querySelectorAll('.stack-card'));
        const prevButton = document.querySelector('[data-stack-prev]');
        const nextButton = document.querySelector('[data-stack-next]');
        let activeIndex = 0;
        let dragging = false;
        let didDrag = false;
        let startX = 0;
        let startY = 0;

        function renderStack() {
            const total = cards.length;
            cards.forEach((card, index) => {
                const offset = (index - activeIndex + total) % total;
                card.dataset.stack = offset < 4 ? String(offset) : 'hidden';
            });
        }

        function moveStack(direction) {
            activeIndex = (activeIndex + direction + cards.length) % cards.length;
            renderStack();
        }

        prevButton.addEventListener('click', () => moveStack(-1));
        nextButton.addEventListener('click', () => moveStack(1));
        stack.addEventListener('pointerdown', e => {
            dragging = true;
            didDrag = false;
            startX = e.clientX;
            startY = e.clientY;
            stack.classList.add('is-dragging');
            stack.setPointerCapture(e.pointerId);
        });

        stack.addEventListener('pointermove', e => {
            if (!dragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            if (Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy)) {
                didDrag = true;
                e.preventDefault();
            }
        });

        function endStackDrag(e) {
            if (!dragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            dragging = false;
            stack.classList.remove('is-dragging');
            if (Math.abs(dx) > 54 && Math.abs(dx) > Math.abs(dy)) {
                moveStack(dx < 0 ? 1 : -1);
            }
            setTimeout(() => { didDrag = false; }, 80);
        }

        stack.addEventListener('pointerup', endStackDrag);
        stack.addEventListener('pointercancel', endStackDrag);

        cards.forEach((card, index) => {
            card.addEventListener('click', () => {
                if (didDrag) return;
                activeIndex = index;
                renderStack();
            });
        });
        renderStack();
    </script>
</body>

</html>
